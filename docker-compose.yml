services:
  db:
    image: postgres:16-alpine
    container_name: webhook-pipeline-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webhook_pipeline
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: webhook-pipeline-api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      API_PORT: 3000
      WORKER_POLL_INTERVAL_MS: 5000
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webhook_pipeline
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: webhook-pipeline-worker
    restart: unless-stopped
    depends_on:
      - db
    environment:
      API_PORT: 3000
      WORKER_POLL_INTERVAL_MS: 5000
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webhook_pipeline

volumes:
  postgres_data: